<div class="container mt-5 text-white">
    <div class="card shadow p-4" style="background-color: #252b36; border: none; border-radius: 10px;">
        <h4 class="mb-4 text-white fw-bold  ">{{currentQuestion.text}}</h4>

        @if (currentQuestion.type === 'sc'){
            <div class="d-flex flex-column gap-3">
                @for (option of currentQuestion.options; track option){
                    <label class="btn btn-outline-light text-start p-3 fw-bold">
                        <input type="radio" name="singleAnswer" class="me-3"> {{ option }}
                    </label>
                }
            </div>
        }

        @if (currentQuestion.type === 'mc'){
            <div class="d-flex flex-column gap-3">
                @for (option of currentQuestion.options; track option){
                    <label class="btn btn-outline-light text-start p-3 fw-bold">
                        <input type="checkbox" class="me-3"> {{ option }}
                    </label>
                }
            </div>
        }

        @if (currentQuestion.type === 'fi'){
            <input type="text" class="form-control form-control-lg text-white"
                    style="background-color: #1a1e24; border: 1px solid #607d9c;"
                    placeholder="Tippe deinen befehl hier ein..."> 
        }

        <div class="mt-5 d-flex justify-content-end">
            <button class="btn text-white fw-bold px-5 py-2" style="background-color: #607d9c;">WEITER</button>
        </div>
    </div>
</div>
