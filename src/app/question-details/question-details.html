<div class="container mt-5 text-white">
  <h3 class="mb-4 fw-bold">Fragenübersicht</h3>

  <div class="d-flex flex-column gap-3">
    @for (q of questions; track q.id){
    <div
      class="d-flex justify-content-between align-items-center p-3 shadow"
      style="background-color: #252b36; border-radius: 10px"
    >
      <span class="fw-bold fs-5">{{ q.questionText }}</span>
      <button class="btn text-white fw-bold px-4" style="background-color: #607d9c">ÜBEN</button>
    </div>
    }
  </div>
</div>
