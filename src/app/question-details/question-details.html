<div class="container mt-5 text-white">
  <h3 class="mb-4 fw-bold">Fragenübersicht: {{ examId }} / {{ topicId }}</h3>

  <p>Anzahl Fragen: {{ questions().length }}</p>

  @if (questions().length > 0) {
  <div class="d-flex flex-column gap-3">
    @for (q of questions(); track q.id) {
    <div class="p-3 shadow" style="background-color: #252b36; border-radius: 10px">
      <div class="fw-bold fs-5 mb-2">{{ q.questionText }}</div>
      <div class="text-secondary">Typ: {{ q.type }}</div>

      <button class="btn text-white fw-bold px-4 mt-3" style="background-color: #607d9c">
        ÜBEN
      </button>
    </div>
    }
  </div>
  } @else {
  <p>Keine Fragen geladen.</p>
  }
</div>
